services:
  postgres:
    image: postgres:16-alpine
    container_name: crawler-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-crawler}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-crawler}
      POSTGRES_DB: ${POSTGRES_DB:-crawlerdb}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-crawler} -d ${POSTGRES_DB:-crawlerdb}",
        ]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  scraper:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: crawler-scraper
    restart: on-failure
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-crawler}:${POSTGRES_PASSWORD:-crawler}@postgres:5432/${POSTGRES_DB:-crawlerdb}?schema=public
      OUTPUT_DIR: /app/output
      PORT: 3000
      SKIP_LLM: ${SKIP_LLM:-false}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4o-mini}
      OPENAI_MAX_TOKENS: ${OPENAI_MAX_TOKENS:-120}
    ports:
      - "${SCRAPER_PORT:-3000}:3000"
    volumes:
      - scraper_output:/app/output

volumes:
  postgres_data:
  scraper_output:
